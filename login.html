<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acceso — M71 Trading</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d;
      color: #fff;
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #151515;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 40px 48px;
      width: 100%;
      max-width: 400px;
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo img {
      height: 44px;
    }
    h1 {
      font-size: 18px;
      font-weight: 600;
      text-align: center;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 13px;
      color: #555;
      text-align: center;
      margin-bottom: 32px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #777;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      background: #1e1e1e;
      border: 1px solid #2e2e2e;
      border-radius: 7px;
      color: #fff;
      font-size: 14px;
      padding: 10px 14px;
      margin-bottom: 18px;
      outline: none;
      font-family: inherit;
      transition: border-color 0.2s;
    }
    input:focus { border-color: #3dff50; }
    input::placeholder { color: #444; }
    .error {
      background: rgba(255, 64, 64, 0.08);
      border: 1px solid rgba(255, 64, 64, 0.2);
      color: #ff6b6b;
      font-size: 13px;
      padding: 10px 14px;
      border-radius: 7px;
      margin-bottom: 16px;
      display: none;
    }
    button {
      width: 100%;
      background: #3dff50;
      color: #000;
      border: none;
      border-radius: 7px;
      font-size: 15px;
      font-weight: 700;
      padding: 13px;
      cursor: pointer;
      font-family: inherit;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.88; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <img src="assets/logo-m71.png" alt="M71 Trading" onerror="this.style.display='none'">
    </div>
    <h1>Iniciar sesión</h1>
    <p class="subtitle">Ingresá tus credenciales para acceder al generador de reportes.</p>

    <div class="error" id="error-msg">Usuario o contraseña incorrectos.</div>

    <form onsubmit="doLogin(event)">
      <label>Usuario</label>
      <input type="text" id="user" placeholder="usuario" required autofocus>
      <label>Contraseña</label>
      <input type="password" id="pass" placeholder="••••••••" required>
      <button type="submit" id="btn">Ingresar</button>
    </form>
  </div>

  <script>
    if (sessionStorage.getItem('m71_token')) {
      window.location.href = '/';
    }

    async function doLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const errEl = document.getElementById('error-msg');
      btn.disabled = true;
      btn.textContent = 'Verificando...';
      errEl.style.display = 'none';

      try {
        const res = await fetch('https://n8n.somospuraia.com/webhook/login-m71', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            user: document.getElementById('user').value.trim(),
            pass: document.getElementById('pass').value
          })
        });
        const data = await res.json();
        if (res.ok && data.token) {
          sessionStorage.setItem('m71_token', data.token);
          window.location.href = '/';
        } else {
          errEl.style.display = 'block';
        }
      } catch {
        errEl.textContent = 'Error de conexión. Intentá de nuevo.';
        errEl.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Ingresar';
      }
    }
  </script>
</body>
</html>
